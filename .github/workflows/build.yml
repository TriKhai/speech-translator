name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:   # cho phép bấm build thủ công trên GitHub web

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download Whisper model
        run: |
          python -c "from faster_whisper import WhisperModel; WhisperModel('tiny.en', download_root='./models')"

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --clean speech_translator.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpeechTranslator-Windows
          path: dist/SpeechTranslator/
          retention-days: 7