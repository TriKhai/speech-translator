name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Uninstall CUDA torch if present
        run: |
          pip uninstall torch torchaudio torchvision -y
        continue-on-error: true

      - name: Install CPU-only torch first
        run: |
          pip install torch==2.2.2 torchaudio==2.2.2 --index-url https://download.pytorch.org/whl/cpu

      - name: Install project dependencies
        run: |
          pip install PyQt6
          pip install faster-whisper
          pip install resemblyzer
          pip install pyannote.audio
          pip install deep-translator
          pip install silero-vad
          pip install sounddevice
          pip install webrtcvad-wheels
          pip install sqlalchemy
          pip install python-dotenv
          pip install pyinstaller

      - name: Verify torch is CPU-only
        run: |
          python -c "import torch; print('torch:', torch.__version__); print('CUDA available:', torch.cuda.is_available())"

      - name: Build EXE
        run: |
          pyinstaller `
            --noconfirm `
            --onedir `
            --windowed `
            --name "SpeechTranslator" `
            --add-data "models;models" `
            --add-data "ui;ui" `
            --add-data "core;core" `
            --add-data "db;db" `
            --hidden-import "pyannote.audio" `
            --hidden-import "pyannote.core" `
            --hidden-import "resemblyzer" `
            --hidden-import "sounddevice" `
            --hidden-import "webrtcvad" `
            --hidden-import "silero_vad" `
            --hidden-import "sklearn.utils._cython_blas" `
            --hidden-import "sklearn.neighbors.typedefs" `
            --hidden-import "sklearn.neighbors._partition_nodes" `
            --collect-all "pyannote" `
            --collect-all "resemblyzer" `
            --collect-all "silero_vad" `
            --collect-all "faster_whisper" `
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpeechTranslator-Windows
          path: dist/SpeechTranslator/
          retention-days: 30