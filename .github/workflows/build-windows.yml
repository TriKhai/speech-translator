name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Uninstall CUDA torch
        run: pip uninstall torch torchaudio torchvision -y
        continue-on-error: true

      - name: Install CPU-only torch
        run: |
          pip install torch==2.2.2 torchaudio==2.2.2 --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          pip install PyQt6 faster-whisper resemblyzer pyannote.audio
          pip install deep-translator silero-vad sounddevice webrtcvad-wheels
          pip install sqlalchemy python-dotenv pyinstaller

      - name: Force remove typing package folder
        shell: python
        run: |
          import sys, shutil, os
          for p in sys.path:
              typing_dir = os.path.join(p, 'typing')
              typing_egg = os.path.join(p, 'typing-3.10.0.0.dist-info')
              typing_egg2 = os.path.join(p, 'typing-3.7.4.3.dist-info')
              for path in [typing_dir, typing_egg, typing_egg2]:
                  if os.path.exists(path):
                      print(f"Removing: {path}")
                      if os.path.isdir(path):
                          shutil.rmtree(path)
                      else:
                          os.remove(path)
          # Xóa typing.py nếu có
          for p in sys.path:
              typing_py = os.path.join(p, 'typing.py')
              if os.path.exists(typing_py):
                  # Đây là stdlib, không xóa
                  pass
          # Xóa dist-info của typing backport
          import glob
          for p in sys.path:
              for f in glob.glob(os.path.join(p, 'typing-*.dist-info')):
                  print(f"Removing dist-info: {f}")
                  shutil.rmtree(f)
          print("Done removing typing backport")

      - name: Inject HF_TOKEN
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python build_config.py

      - name: Build EXE
        run: pyinstaller speech_translator.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpeechTranslator-Windows
          path: dist/SpeechTranslator/
          retention-days: 30