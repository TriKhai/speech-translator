name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Uninstall incompatible packages
        run: |
          pip uninstall typing -y
          pip uninstall torch torchaudio torchvision -y
        continue-on-error: true

      - name: Install CPU-only torch
        run: |
          pip install torch==2.2.2 torchaudio==2.2.2 --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          pip install PyQt6 faster-whisper resemblyzer pyannote.audio
          pip install deep-translator silero-vad sounddevice webrtcvad-wheels
          pip install sqlalchemy python-dotenv pyinstaller

      - name: Inject HF_TOKEN
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python build_config.py

      - name: Build EXE
        run: pyinstaller speech_translator.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpeechTranslator-Windows
          path: dist/SpeechTranslator/
          retention-days: 30